{{ define "login" }}
{{ template "header" . }}
<div class="login-wrap">
  <app-panel strong class="login-card">
    <app-kicker>{{ tr .Dict "login_kicker" }}</app-kicker>
    <h1 class="title" style="font-size:2rem;margin:0.8rem 0 0.35rem;">{{ tr .Dict "login_title" }}</h1>
    <p class="muted" style="margin:0 0 1rem;">{{ tr .Dict "login_desc" }}</p>

    {{ if .Error }}
    <div class="error-box">{{ .Error }}</div>
    {{ end }}

    <form method="post" action="{{ withLang "/login" .Lang }}">
      <input type="hidden" name="next" value="{{ .Next }}">

      <div class="field">
        <label for="username">{{ tr .Dict "login_username" }}</label>
        <input id="username" name="username" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">{{ tr .Dict "login_password" }}</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="btn-primary" type="submit" style="width:100%;margin-top:0.65rem;">{{ tr .Dict "login_submit" }}</button>
    </form>

    <p class="muted" style="margin:0.85rem 0 0;font-size:0.8rem;">{{ tr .Dict "login_hint" }}</p>
  </app-panel>
</div>
{{ template "footer" . }}
{{ end }}
